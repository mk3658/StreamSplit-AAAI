# StreamSplit Configuration for Google Colab / GPU Training

# General settings
experiment:
  name: "streamsplit_audioset_gpu"
  seed: 42
  device: "cuda"  # Will be auto-detected: cuda > mps > cpu
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"
  
# Dataset configuration
data:
  dataset: "audioset"  # audioset, edge_audio
  data_dir: "./data"
  sample_rate: 16000
  audio_duration: 10  # seconds
  num_classes: 10
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  
# Edge device configuration
edge:
  device_type: "raspberry_pi_4b"
  
  # Audio processing
  fft:
    window_size_ms: 25  # 400 samples at 16kHz
    hop_size_ms: 10     # 160 samples
    n_fft: 512
    n_mels: 128
    fmin: 80
    fmax: 8000
  
  # Adaptive feature extraction
  adaptive_policy:
    enabled: true
    resource_threshold: 0.70
    hysteresis_up: 0.03
    hysteresis_down: 0.05
    weights:
      cpu: 0.5
      memory: 0.3
      battery: 0.15
      thermal: 0.05
  
  # Reduced resolution settings
  reduced_resolution:
    n_mels: 64
    hop_size_ms: 20
    fmin: 80
    fmax: 8000
  
  # Memory bank
  memory_bank:
    min_size: 64
    max_size: 512
    embedding_dim: 128
    
  # Distribution-aware sampling (DAS)
  das:
    num_components: 5  # GMM components
    alpha: 1.0  # Sampling temperature
    epsilon: 1e-6
    
  # Local contrastive learning
  contrastive:
    temperature: 0.1
    momentum: 0.999
    lambda_consistency: 0.1
    gradient_accumulation: 4
    
  # Augmentations
  augmentation:
    time_shift: 0.2
    freq_mask_param: 10
    amplitude_scale: [0.8, 1.2]
    
  # Resource monitoring
  resource_monitor:
    poll_interval_ms: 100
    
# Server configuration
server:
  host: "0.0.0.0"
  port: 8080
  
  # Model architecture
  encoder:
    backbone: "mobilenet_v3_small"
    width_mult: 0.75
    embedding_dim: 128
    use_early_exit: true
    split_points: [0, 2, 4, 7, 11, 13]  # Layer indices for RL splitting
    
  # Training (GPU-optimized settings)
  training:
    batch_size: 512  # Increased for GPU (was 256)
    num_epochs: 100
    learning_rate: 0.0005  # 5e-4 in decimal
    weight_decay: 0.0001
    device: "cuda"  # Will be auto-detected
    save_interval: 10
    gradient_clip: 1.0
    warmup_epochs: 5
    
  # Server-side aggregation
  aggregation:
    num_neighbors: 16
    momentum: 0.999
    
  # Uncertainty estimation
  uncertainty:
    method: "entropy"  # entropy, variance
    threshold: 0.5
    
# Hybrid loss configuration
loss:
  # Weights
  local_weight: 0.5
  global_weight: 0.3
  rl_weight: 0.2
  
  # Contrastive parameters
  contrastive:
    temperature: 0.07
    base_temperature: 0.07
    
  # Classification
  classification:
    label_smoothing: 0.1
    
# RL-based splitting configuration
splitting:
  enabled: true
  
  # PPO parameters
  ppo:
    gamma: 0.99
    lambda_gae: 0.95
    clip_epsilon: 0.2
    value_coef: 0.5
    entropy_coef: 0.01
    learning_rate: 0.0003  # 3e-4
    max_grad_norm: 0.5
    ppo_epochs: 4
    mini_batch_size: 64
    
  # Environment
  env:
    max_episode_steps: 100
    reward_scale: 1.0
    
  # Reward weights
  rewards:
    accuracy: 0.4
    latency: 0.3
    bandwidth: 0.2
    energy: 0.1
    
  # Action space
  action_space:
    type: "discrete"  # discrete, continuous
    
# Data loading (GPU-optimized)
dataloader:
  batch_size: 512  # Increased for GPU
  num_workers: 4  # Increased for faster data loading
  pin_memory: true  # Enable for faster GPU transfer
  persistent_workers: true
  prefetch_factor: 2
